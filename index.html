<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラストウォー S6 連盟戦力比較</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh}
.dash{padding:1.5rem;max-width:1200px;margin:0 auto}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #2a2d3a}
.header h1{font-size:20px;font-weight:600;color:#e8eaf0;letter-spacing:0.5px;white-space:nowrap}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:#1e3a5f;color:#5ba3f5;font-weight:600}
.badge2{font-size:11px;padding:3px 10px;border-radius:20px;background:#1a1a2e;color:#888;font-weight:500}
.update{font-size:11px;color:#555;margin-left:auto}
.main-grid{display:grid;grid-template-columns:1fr 280px 1fr;gap:14px;align-items:start}
@media(max-width:480px){
  .header h1{font-size:14px}
  .badge{font-size:10px;padding:2px 6px}
  .update{font-size:10px}
  .tab-btn{font-size:12px;padding:6px 12px}
}
@media(max-width:900px){
  .main-grid{grid-template-columns:1fr;grid-template-areas:'left' 'center' 'right'}
  .side-card.left{grid-area:left}
  .center-card{grid-area:center}
  .side-card.right{grid-area:right}
  .ranker-list-body{height:auto;max-height:260px}
  .bar-wrap{height:32px}
  .bar-left,.bar-right{font-size:12px}
}
.side-card{background:#161822;border:1px solid #2a2d3a;border-radius:12px;overflow:hidden}
.side-card.left{border-top:3px solid #3b7dd8}
.side-card.right{border-top:3px solid #d4851a}
.side-header{padding:12px 14px;background:#1a1d2a;border-bottom:1px solid #2a2d3a}
.side-header .team-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sel-row{display:flex;gap:8px}
.sel-row select{flex:1;font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #333;background:#0f1117;color:#e8eaf0;cursor:pointer;outline:none;width:0;min-width:0}
.sel-row select:focus{border-color:#3b7dd8}

/* 基礎データエリア */
.basic-stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:#12141f;border-bottom:1px solid #2a2d3a;padding:8px 14px;gap:4px}
.bs-item{text-align:center}
.bs-item .lbl{font-size:9px;color:#555;margin-bottom:3px;letter-spacing:0.5px}
.bs-item .val{font-size:12px;font-weight:600;color:#c8cad8}
.bs-item .val.members{color:#5bb87a}
.bs-item .val.power{color:#a78bfa}
.bs-item .val.kill{color:#f5a623}

.minmax-row{display:grid;grid-template-columns:1fr 1fr;background:#1a1d2a;padding:8px 14px;border-bottom:1px solid #2a2d3a}
.mm-item{text-align:center}
.mm-item .lbl{font-size:9px;color:#555;margin-bottom:2px}
.mm-item .num{font-size:13px;font-weight:600}
.num.max-c{color:#5ba3f5}
.num.min-c{color:#5bb87a}
.ranker-list{padding:0 14px 10px;}
.ranker-list-header{padding:8px 14px 5px;border-bottom:1px solid #2a2d3a;background:#161822;position:sticky;top:0;z-index:1}
.ranker-list-body{height:520px;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;padding:0 0 10px}
.ranker-list-body::-webkit-scrollbar{width:4px}
.ranker-list-body::-webkit-scrollbar-track{background:#161822}
.ranker-list-body::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.r-header{display:grid;grid-template-columns:1fr 52px 68px;gap:4px;padding:0 0 5px;font-size:10px;color:#555;border-bottom:1px solid #2a2d3a;margin-bottom:4px}
.r-header span:nth-child(2){text-align:center}
.r-header span:nth-child(3){text-align:right}
.ranker-item{display:grid;grid-template-columns:1fr 52px 68px;gap:4px;padding:5px 0;border-bottom:1px solid #1e2130;font-size:12px;height:26px;align-items:center}
.ranker-item:last-child{border-bottom:none}
.r-name{color:#c8cad8;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-class{color:#666;text-align:center}
.r-class.tank{color:#5ba3f5}
.r-class.air{color:#5bb87a}
.r-class.rocket{color:#f5a623}
.r-power{text-align:right;font-weight:600;color:#a78bfa}
.ranker-item.hero-only{background:#1a1d2a;opacity:0.8}
.ranker-item.hero-only .r-power{color:#888}
.loading{text-align:center;padding:1.5rem;color:#555;font-size:12px}
.center-card{background:#161822;border:1px solid #2a2d3a;border-radius:12px;padding:16px}
.vs-title{font-size:11px;color:#666;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.vs-badge{text-align:center;margin-bottom:20px}
.vs-badge span{font-size:16px;font-weight:700;color:#3b3d50;letter-spacing:4px}
.bar-section{margin-bottom:18px}
.bar-label{font-size:10px;color:#666;text-align:center;margin-bottom:8px;letter-spacing:0.5px}
.bar-wrap{display:flex;align-items:center;gap:0;height:28px;background:#1a1d2a;border-radius:6px;overflow:hidden;position:relative}
.bar-left{height:100%;display:flex;align-items:center;justify-content:flex-end;transition:width 0.5s ease;padding-right:6px}
.bar-left.blue{background:#1e3a5f;border-right:2px solid #0f1117}
.bar-right{height:100%;display:flex;align-items:center;justify-content:flex-start;transition:width 0.5s ease;padding-left:6px}
.bar-right.amber{background:#3d2a0a;border-left:2px solid #0f1117}
.bar-val-left{font-size:11px;font-weight:600;color:#5ba3f5;white-space:nowrap}
.bar-val-right{font-size:11px;font-weight:600;color:#f5a623;white-space:nowrap}
.bar-center{width:2px;background:#0f1117;flex-shrink:0;height:100%}
.pie-row{display:flex;justify-content:space-around;align-items:center;gap:8px;margin-top:8px}
.pie-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
.pie-wrap canvas{max-width:120px;max-height:120px}
.pie-legend-common{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 12px;margin-top:10px;padding-top:8px;border-top:1px solid #2a2d3a}
.pie-legend-common .leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.pie-legend-common .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.tab-nav{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #2a2d3a;background:transparent;color:#666;transition:all 0.15s}
.tab-btn.active{background:#1e3a5f;border-color:#3b7dd8;color:#5ba3f5}
.tab-btn:hover:not(.active){border-color:#3b7dd8;color:#5ba3f5}

.tier-wrap{max-width:800px}
.tier-controls{margin-bottom:16px}
.tier-filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tier-filter-row select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #333;background:#0f1117;color:#e8eaf0;cursor:pointer;outline:none}
.tier-total{font-size:12px;color:#555;margin-left:auto}

.tier-group{margin-bottom:20px;background:#161822;border:1px solid #2a2d3a;border-radius:10px;overflow:hidden}
.tier-group-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1a1d2a;border-bottom:1px solid #2a2d3a}
.tier-label{font-size:13px;font-weight:700}
.tier-range{font-size:11px;color:#555}
.tier-count{font-size:11px;color:#888;margin-left:auto}
.tier-t1 .tier-label{color:#ff4d4d}
.tier-t2 .tier-label{color:#ff9544}
.tier-t3 .tier-label{color:#ffd166}
.tier-t4 .tier-label{color:#5bb87a}
.tier-t5 .tier-label{color:#5ba3f5}
.tier-t6 .tier-label{color:#666}
.tier-t1{border-left:3px solid #ff4d4d}
.tier-t2{border-left:3px solid #ff9544}
.tier-t3{border-left:3px solid #ffd166}
.tier-t4{border-left:3px solid #5bb87a}
.tier-t5{border-left:3px solid #5ba3f5}
.tier-t6{border-left:3px solid #333}

.tier-rows{padding:8px 0}
.tier-row{display:grid;grid-template-columns:48px 64px 1fr 80px;gap:8px;padding:4px 14px;font-size:12px;border-bottom:1px solid #1e2130;align-items:center}
.tier-row:last-child{border-bottom:none}
.tr-zone{color:#555;font-size:11px}
.tr-alliance{color:#888;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-name{color:#c8cad8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-power{text-align:right;color:#a78bfa;font-weight:600;font-size:11px}
.tier-collapsed .tier-rows{display:none}
.tier-toggle{cursor:pointer;font-size:10px;color:#555;margin-left:6px}
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <h1>連盟 戦力比較</h1>
    <span class="badge">S6</span>
    <span class="badge2">ラストウォー</span>
    <span class="update" id="update-time">読み込み中...</span>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('compare')">⚔️ 連盟比較</button>
    <button class="tab-btn" onclick="switchTab('tier')">📊 Tier分析</button>
  </div>
  <div id="tab-compare" class="tab-content">
  <div class="main-grid">
    <div class="side-card left">
      <div class="side-header">
        <div class="team-label">自連盟</div>
        <div class="sel-row">
          <select id="left-zone" onchange="onZoneChange('left')"><option value="">戦域...</option></select>
          <select id="left-alliance" onchange="onAllianceChange('left')"><option value="">連盟...</option></select>
        </div>
      </div>
      <div class="basic-stats" id="left-basic">
        <div class="bs-item"><div class="lbl">連盟人数</div><div class="val members" id="left-bs-members">—</div></div>
        <div class="bs-item"><div class="lbl">連盟総戦力(B)</div><div class="val power" id="left-bs-power">—</div></div>
        <div class="bs-item"><div class="lbl">撃破数(B)</div><div class="val kill" id="left-bs-kill">—</div></div>
      </div>
      <div class="minmax-row">
        <div class="mm-item"><div class="lbl">ランカーMAX推定</div><div class="num max-c" id="left-max">—</div></div>
        <div class="mm-item"><div class="lbl">ランカーMIN推定</div><div class="num min-c" id="left-min">—</div></div>
      </div>
      <div class="ranker-list">
        <div class="ranker-list-header">
          <div class="r-header"><span>指揮官名</span><span>兵科</span><span>推定1軍</span></div>
        </div>
        <div class="ranker-list-body" id="left-rankers"><div class="loading">連盟を選択してください</div></div>
      </div>
    </div>

    <div class="center-card">
      <div class="vs-badge"><span>VS</span></div>
      <div class="bar-section">
        <div class="bar-label">連盟戦力指数</div>
        <div class="bar-wrap" id="bw-power">
          <div class="bar-left blue" id="bl-power" style="width:50%"><span class="bar-val-left" id="bv-left-power">—</span></div>
          <div class="bar-center"></div>
          <div class="bar-right amber" id="br-power" style="width:50%"><span class="bar-val-right" id="bv-right-power">—</span></div>
        </div>
      </div>
      <div class="bar-section">
        <div class="bar-label">連盟人数</div>
        <div class="bar-wrap">
          <div class="bar-left blue" id="bl-members" style="width:50%"><span class="bar-val-left" id="bv-left-members">—</span></div>
          <div class="bar-center"></div>
          <div class="bar-right amber" id="br-members" style="width:50%"><span class="bar-val-right" id="bv-right-members">—</span></div>
        </div>
      </div>
      <div class="bar-section">
        <div class="bar-label">最強英雄ランクイン人数</div>
        <div class="bar-wrap">
          <div class="bar-left blue" id="bl-rankers" style="width:50%"><span class="bar-val-left" id="bv-left-rankers">—</span></div>
          <div class="bar-center"></div>
          <div class="bar-right amber" id="br-rankers" style="width:50%"><span class="bar-val-right" id="bv-right-rankers">—</span></div>
        </div>
      </div>
      <div class="bar-section">
        <div class="bar-label">英雄総ランクイン人数</div>
        <div class="bar-wrap">
          <div class="bar-left blue" id="bl-hero" style="width:50%"><span class="bar-val-left" id="bv-left-hero">—</span></div>
          <div class="bar-center"></div>
          <div class="bar-right amber" id="br-hero" style="width:50%"><span class="bar-val-right" id="bv-right-hero">—</span></div>
        </div>
      </div>
      <div class="bar-section" style="margin-bottom:0">
        <div class="bar-label">Tier分布</div>
        <div class="pie-row">
          <div class="pie-wrap">
            <canvas id="pie-left" width="120" height="120"></canvas>
          </div>
          <div class="pie-wrap">
            <canvas id="pie-right" width="120" height="120"></canvas>
          </div>
        </div>
        <div class="pie-legend-common" id="pie-legend-common"></div>
      </div>
    </div>

    <div class="side-card right">
      <div class="side-header">
        <div class="team-label">対戦相手</div>
        <div class="sel-row">
          <select id="right-zone" onchange="onZoneChange('right')"><option value="">戦域...</option></select>
          <select id="right-alliance" onchange="onAllianceChange('right')"><option value="">連盟...</option></select>
        </div>
      </div>
      <div class="basic-stats" id="right-basic">
        <div class="bs-item"><div class="lbl">連盟人数</div><div class="val members" id="right-bs-members">—</div></div>
        <div class="bs-item"><div class="lbl">連盟総戦力(B)</div><div class="val power" id="right-bs-power">—</div></div>
        <div class="bs-item"><div class="lbl">撃破数(B)</div><div class="val kill" id="right-bs-kill">—</div></div>
      </div>
      <div class="minmax-row">
        <div class="mm-item"><div class="lbl">ランカーMAX推定</div><div class="num max-c" id="right-max">—</div></div>
        <div class="mm-item"><div class="lbl">ランカーMIN推定</div><div class="num min-c" id="right-min">—</div></div>
      </div>
      <div class="ranker-list">
        <div class="ranker-list-header">
          <div class="r-header"><span>指揮官名</span><span>兵科</span><span>推定1軍</span></div>
        </div>
        <div class="ranker-list-body" id="right-rankers"><div class="loading">連盟を選択してください</div></div>
      </div>
    </div>
  </div>
</div>
  </div><!-- /tab-compare -->

  <div id="tab-tier" class="tab-content" style="display:none;">
    <div class="tier-wrap">
      <div class="tier-controls">
        <div class="tier-filter-row">
          <select id="tier-zone-filter" onchange="updateTierAllianceFilter();renderTier()">
            <option value="">全戦域</option>
          </select>
          <select id="tier-alliance-filter" onchange="renderTier()">
            <option value="">全連盟</option>
          </select>
          <span class="tier-total" id="tier-total"></span>
        </div>
      </div>
      <div id="tier-list"><div class="loading">データを読み込み中...</div></div>
    </div>
  </div><!-- /tab-tier -->

</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyrCsPDcpbPkoppGeqUmQM3mf8kO6gDW1_9D40q2KvkSSO9KRtgYBh5aMOZBksz3u0L9A/exec';
let allData={comparison:[],rankers:[],comprehensive:[],heroRankers:[],alliancePower:[],allianceKill:[],heroTotal:[]};
let state={left:{zone:'',alliance:''},right:{zone:'',alliance:''}};

async function fetchSheet(name){
  const res=await fetch(GAS_URL+'?sheet='+encodeURIComponent(name));
  return await res.json();
}

async function init(){
  try{
    const[comp,rank,comp2,heroRank]=await Promise.all([
      fetchSheet('BI_連盟比較'),
      fetchSheet('BI_指揮官1軍推定'),
      fetchSheet('BI_連盟総合力'),
      fetchSheet('BI_指揮官1軍推定_英雄総')
    ]);
    allData.comparison=comp;
    allData.rankers=rank;
    allData.comprehensive=comp2;
    allData.heroRankers=heroRank;
    // 統合_連盟総戦力・統合_連盟撃破数・統合_英雄総戦力はシートがない場合もある
    try{ allData.alliancePower=await fetchSheet('統合_連盟総戦力'); }catch(e){ allData.alliancePower=[]; }
    try{ allData.allianceKill=await fetchSheet('統合_連盟撃破数'); }catch(e){ allData.allianceKill=[]; }
    try{ allData.heroTotal=await fetchSheet('統合_英雄総戦力'); }catch(e){ allData.heroTotal=[]; }
    if(!Array.isArray(allData.alliancePower)) allData.alliancePower=[];
    if(!Array.isArray(allData.allianceKill)) allData.allianceKill=[];
    if(!Array.isArray(allData.heroTotal)) allData.heroTotal=[];
    initTierFilters();
    const zones=[...new Set(comp.map(r=>r['戦域']).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));
    ['left-zone','right-zone'].forEach(id=>{
      const sel=document.getElementById(id);
      zones.forEach(z=>{const o=document.createElement('option');o.value=z;o.textContent=z+'戦域';sel.appendChild(o);});
    });
    document.getElementById('update-time').textContent='更新: '+new Date().toLocaleTimeString('ja-JP');

    const savedLZ=localStorage.getItem('lw_left_zone');
    const savedLA=localStorage.getItem('lw_left_alliance');
    const savedRZ=localStorage.getItem('lw_right_zone');
    const savedRA=localStorage.getItem('lw_right_alliance');

    if(savedLZ){
      document.getElementById('left-zone').value=savedLZ;
      onZoneChange('left');
      if(savedLA){document.getElementById('left-alliance').value=savedLA;onAllianceChange('left');}
    }
    if(savedRZ){
      document.getElementById('right-zone').value=savedRZ;
      onZoneChange('right');
      if(savedRA){document.getElementById('right-alliance').value=savedRA;onAllianceChange('right');}
    }
  }catch(e){
    document.getElementById('update-time').textContent='エラー: '+e.message;
  }
}

function isValidAllianceName(name){
  if(!name)return false;
  if(name.length>20)return false;
  if(/^\d{4}-\d{2}-\d{2}/.test(name))return false;
  if(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/.test(name))return false;
  if(name==='-')return true;
  return true;
}

function saveState(){
  localStorage.setItem('lw_left_zone',state.left.zone);
  localStorage.setItem('lw_left_alliance',state.left.alliance);
  localStorage.setItem('lw_right_zone',state.right.zone);
  localStorage.setItem('lw_right_alliance',state.right.alliance);
}

function onZoneChange(side){
  const zone=document.getElementById(side+'-zone').value;
  state[side].zone=zone;
  const sel=document.getElementById(side+'-alliance');
  sel.innerHTML='<option value="">連盟...</option>';
  if(!zone)return;
  const names=[...new Set(allData.comparison.filter(r=>String(r['戦域'])===String(zone)&&r['連盟名']&&isValidAllianceName(r['連盟名'])).map(r=>r['連盟名']))];
  names.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sel.appendChild(o);});
  saveState();
}

function classStyle(c){
  if(!c)return'';
  if(c.includes('戦車'))return'tank';
  if(c.includes('航空'))return'air';
  if(c.includes('ロケラン'))return'rocket';
  return'';
}

function formatB(val){
  if(val==null||val===''||val===0)return'—';
  const n=Number(val);
  if(isNaN(n)||n===0)return'—';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(0)+'M';
  return n.toLocaleString();
}

function onAllianceChange(side){
  const alliance=document.getElementById(side+'-alliance').value;
  state[side].alliance=alliance;
  saveState();
  if(!alliance)return;
  const zone=state[side].zone;
  const c2=allData.comprehensive.find(r=>r['連盟タグ']===alliance);
  const maxVal=c2&&c2['ランカーMAX推定(M)']!=null?c2['ランカーMAX推定(M)']+'M':'—';
  const minRaw=c2?c2['ランカーMIN推定(M)']:null;
  const minVal=minRaw!=null&&minRaw!==''&&Number(minRaw)!==0?Number(minRaw)+'M':'—';
  document.getElementById(side+'-max').textContent=maxVal;
  document.getElementById(side+'-min').textContent=minVal;

  // 基礎データ更新
  const members=c2?c2['連盟人数']:null;
  // 連盟総戦力（統合_連盟総戦力から該当戦域・連盟タグで検索）
  const powRow=allData.alliancePower.find(r=>String(r['戦域番号'])===String(zone)&&r['連盟コード']===alliance);
  // 撃破数（統合_連盟撃破数から検索）
  const killRow=allData.allianceKill.find(r=>String(r['戦域番号'])===String(zone)&&r['連盟コード']===alliance);

  document.getElementById(side+'-bs-members').textContent=members||'—';
  document.getElementById(side+'-bs-power').textContent=powRow?formatB(powRow['戦力']):'—';
  document.getElementById(side+'-bs-kill').textContent=killRow?formatB(killRow['撃破数']):'—';

  const rankers=allData.rankers.filter(r=>r['連盟名']===alliance).slice(0,50);
  const heroRankers=allData.heroRankers.filter(r=>r['連盟タグ']===alliance||r['連盟名']===alliance).slice(0,50);
  const cont=document.getElementById(side+'-rankers');
  const FIXED_ROWS=20;
  let items=[];
  rankers.forEach(r=>items.push({name:r['指揮官名'],class:r['兵科'],power:r['1軍推定戦力(M)'],type:'ranker'}));
  heroRankers.forEach(r=>items.push({name:r['指揮官名'],class:r['兵科']||'—',power:r['1軍推定戦力(M)※参考値'],type:'hero'}));
  let html=items.map(r=>`<div class="ranker-item${r.type==='hero'?' hero-only':''}"><span class="r-name">${r.name||'—'}</span><span class="r-class ${classStyle(r.class)}">${r.class||'—'}</span><span class="r-power">${r.power||'—'}</span></div>`).join('');
  for(let i=items.length;i<FIXED_ROWS;i++){
    html+=`<div class="ranker-item"><span class="r-name" style="color:#2a2d3a">—</span><span class="r-class"></span><span class="r-power"></span></div>`;
  }
  cont.innerHTML=html||'<div class="loading">ランカーデータなし</div>';
  updateBars();
  updatePieCharts();
}

function setBar(leftId,rightId,lvId,rvId,lv,rv){
  const total=(Number(lv)||0)+(Number(rv)||0);
  const lp=total>0?Math.round((Number(lv)||0)/total*100):50;
  const rp=total>0?Math.round((Number(rv)||0)/total*100):50;
  document.getElementById(leftId).style.width=lp+'%';
  document.getElementById(rightId).style.width=rp+'%';
  document.getElementById(lvId).textContent=lv!=null&&lv!==''?lv:'—';
  document.getElementById(rvId).textContent=rv!=null&&rv!==''?rv:'—';
}

function updateBars(){
  const lz=state.left.zone,la=state.left.alliance;
  const rz=state.right.zone,ra=state.right.alliance;
  const lc2=allData.comprehensive.find(r=>r['連盟タグ']===la);
  const rc2=allData.comprehensive.find(r=>r['連盟タグ']===ra);
  const lc1=allData.comparison.find(r=>String(r['戦域'])===String(lz)&&r['連盟名']===la);
  const rc1=allData.comparison.find(r=>String(r['戦域'])===String(rz)&&r['連盟名']===ra);
  setBar('bl-power','br-power','bv-left-power','bv-right-power',lc2?lc2['連盟戦力指数']:null,rc2?rc2['連盟戦力指数']:null);
  setBar('bl-members','br-members','bv-left-members','bv-right-members',lc2?lc2['連盟人数']:null,rc2?rc2['連盟人数']:null);
  setBar('bl-rankers','br-rankers','bv-left-rankers','bv-right-rankers',lc1?lc1['最強英雄RankIn']:null,rc1?rc1['最強英雄RankIn']:null);
  setBar('bl-hero','br-hero','bv-left-hero','bv-right-hero',lc1?lc1['英雄総RankIn']:null,rc1?rc1['英雄総RankIn']:null);
}

document.querySelectorAll('.ranker-list-body').forEach(el=>{
  let startY=0;
  el.addEventListener('touchstart',function(e){
    startY=e.touches[0].clientY;
    if(this.scrollTop===0)this.scrollTop=1;
    else if(this.scrollTop+this.offsetHeight>=this.scrollHeight)this.scrollTop=this.scrollHeight-this.offsetHeight-1;
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    const delta=startY-e.touches[0].clientY;
    const atTop=this.scrollTop<=0;
    const atBottom=this.scrollTop+this.offsetHeight>=this.scrollHeight;
    if((atTop&&delta<0)||(atBottom&&delta>0)){e.preventDefault();}
    else{e.stopPropagation();}
  },{passive:false});
});

const TIER_COLORS = {
  t1: '#ff4d4d', t2: '#ff9544', t3: '#ffd166',
  t4: '#5bb87a', t5: '#5ba3f5', t6: '#444'
};
const TIER_LABELS = {
  t1:'Tier1', t2:'Tier2', t3:'Tier3', t4:'Tier4', t5:'Tier5', t6:'Tier6'
};

function getTierForPower(power, allSorted) {
  const n = allSorted.length;
  const rank = allSorted.findIndex(r => Number(r['戦力']) <= Number(power));
  const pct = rank / n;
  if (pct < 0.02) return 't1';
  if (pct < 0.10) return 't2';
  if (pct < 0.30) return 't3';
  if (pct < 0.60) return 't4';
  if (pct < 0.80) return 't5';
  return 't6';
}

function drawPieChart(canvasId, tierCounts) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const total = Object.values(tierCounts).reduce((a,b) => a+b, 0);
  const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx,cy) - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (total === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2*Math.PI);
    ctx.fillStyle = '#2a2d3a';
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('—', cx, cy+4);
    return;
  }
  const tiers = ['t1','t2','t3','t4','t5','t6'];
  let startAngle = -Math.PI / 2;
  // スライス描画
  tiers.forEach(t => {
    const count = tierCounts[t] || 0;
    if (count === 0) return;
    const slice = (count / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = TIER_COLORS[t];
    ctx.fill();
    ctx.strokeStyle = '#0f1117';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    startAngle += slice;
  });
  // スライスの中央に人数を描画
  startAngle = -Math.PI / 2;
  tiers.forEach(t => {
    const count = tierCounts[t] || 0;
    if (count === 0) return;
    const slice = (count / total) * 2 * Math.PI;
    if (slice < 0.35) { startAngle += slice; return; } // 小さすぎるスライスはスキップ
    const midAngle = startAngle + slice / 2;
    const tx = cx + (r * 0.62) * Math.cos(midAngle);
    const ty = cy + (r * 0.62) * Math.sin(midAngle);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(count, tx, ty);
    startAngle += slice;
  });
}

function drawPieLegend() {
  const tiers = ['t1','t2','t3','t4','t5','t6'];
  const legendEl = document.getElementById('pie-legend-common');
  if (!legendEl) return;
  legendEl.innerHTML = tiers.map(t =>
    `<div class="leg-item"><div class="leg-dot" style="background:${TIER_COLORS[t]}"></div>${TIER_LABELS[t]}</div>`
  ).join('');
}

function updatePieCharts() {
  drawPieLegend();
  const la = state.left.alliance;
  const ra = state.right.alliance;
  const heroData = allData.heroTotal || [];
  if (!heroData.length) return;
  const allSorted = heroData.filter(r => r['戦力'] > 0).sort((a,b) => Number(b['戦力']) - Number(a['戦力']));

  ['left','right'].forEach(side => {
    const alliance = side === 'left' ? la : ra;
    const counts = {t1:0,t2:0,t3:0,t4:0,t5:0,t6:0};
    if (alliance) {
      heroData.filter(r => r['連盟コード'] === alliance).forEach(r => {
        const t = getTierForPower(r['戦力'], allSorted);
        counts[t]++;
      });
    }
    drawPieChart('pie-'+side, counts);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  event.target.classList.add('active');
  if (tab === 'tier') renderTier();
}

function formatM(val) {
  if (!val || isNaN(val)) return '—';
  return (Number(val) / 1e6).toFixed(1) + 'M';
}

function renderTier() {
  const zoneFilter = document.getElementById('tier-zone-filter').value;
  const alliFilter = document.getElementById('tier-alliance-filter').value;

  let data = allData.heroTotal || [];
  if (!data.length) {
    document.getElementById('tier-list').innerHTML = '<div class="loading">統合_英雄総戦力のデータがありません</div>';
    return;
  }

  // フィルタ
  let filtered = data;
  if (zoneFilter) filtered = filtered.filter(r => String(r['戦域番号']) === String(zoneFilter));
  if (alliFilter) filtered = filtered.filter(r => r['連盟コード'] === alliFilter);

  // 戦力でソート
  filtered = filtered.filter(r => r['戦力'] > 0)
    .sort((a, b) => Number(b['戦力']) - Number(a['戦力']));

  const total = filtered.length;
  document.getElementById('tier-total').textContent = '合計 ' + total + '人';

  // Tier境界（全データ基準）
  const allSorted = data.filter(r => r['戦力'] > 0).sort((a, b) => Number(b['戦力']) - Number(a['戦力']));
  const n = allSorted.length;
  const thresholds = [
    { key: 't1', label: 'Tier 1', pct: 0.02 },
    { key: 't2', label: 'Tier 2', pct: 0.10 },
    { key: 't3', label: 'Tier 3', pct: 0.30 },
    { key: 't4', label: 'Tier 4', pct: 0.60 },
    { key: 't5', label: 'Tier 5', pct: 0.80 },
    { key: 't6', label: 'Tier 6', pct: 1.00 },
  ];

  // 各Tierの最低戦力を計算
  const tierBounds = thresholds.map((t, i) => {
    const idx = Math.floor(n * t.pct) - 1;
    const minPower = idx >= 0 && idx < n ? Number(allSorted[idx]['戦力']) : 0;
    const prevIdx = i > 0 ? Math.floor(n * thresholds[i-1].pct) - 1 : -1;
    const maxPower = prevIdx >= 0 ? Number(allSorted[prevIdx]['戦力']) : Number(allSorted[0]['戦力']);
    return { ...t, minPower, maxPower };
  });

  // 各指揮官のTierを判定
  function getTier(power) {
    const p = Number(power);
    const rank = allSorted.findIndex(r => Number(r['戦力']) <= p);
    const pct = rank / n;
    if (pct < 0.02) return 't1';
    if (pct < 0.10) return 't2';
    if (pct < 0.30) return 't3';
    if (pct < 0.60) return 't4';
    if (pct < 0.80) return 't5';
    return 't6';
  }

  // グループ化
  const groups = { t1:[], t2:[], t3:[], t4:[], t5:[], t6:[] };
  filtered.forEach(r => {
    const tier = getTier(r['戦力']);
    groups[tier].push(r);
  });

  let html = '';
  thresholds.forEach((t, i) => {
    const rows = groups[t.key];
    const bound = tierBounds[i];
    const prevPct = i > 0 ? thresholds[i-1].pct * 100 : 0;
    const pctLabel = i === 0 ? '上位2%' : `上位${prevPct.toFixed(0)}%〜${(t.pct*100).toFixed(0)}%`;
    const powerLabel = bound.minPower > 0 ? formatM(bound.minPower) + '以上' : '';

    html += `<div class="tier-group tier-${t.key}" id="tg-${t.key}">
      <div class="tier-group-header" onclick="toggleTier('${t.key}')">
        <span class="tier-label">${t.label}</span>
        <span class="tier-range">${pctLabel}${powerLabel ? ' · ' + powerLabel : ''}</span>
        <span class="tier-count">${rows.length}人</span>
        <span class="tier-toggle" id="tt-${t.key}">▼</span>
      </div>
      <div class="tier-rows">`;

    rows.forEach(r => {
      html += `<div class="tier-row">
        <span class="tr-zone">#${r['戦域番号']}</span>
        <span class="tr-alliance">${r['連盟コード']||'—'}</span>
        <span class="tr-name">${r['指揮官名']||'—'}</span>
        <span class="tr-power">${formatM(r['戦力'])}</span>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('tier-list').innerHTML = html || '<div class="loading">データなし</div>';
}

function toggleTier(key) {
  const group = document.getElementById('tg-' + key);
  const toggle = document.getElementById('tt-' + key);
  group.classList.toggle('tier-collapsed');
  toggle.textContent = group.classList.contains('tier-collapsed') ? '▶' : '▼';
}

function initTierFilters() {
  const data = allData.heroTotal || [];
  const zones = [...new Set(data.map(r => r['戦域番号']).filter(Boolean))].sort((a,b) => Number(a)-Number(b));
  const zSel = document.getElementById('tier-zone-filter');
  zones.forEach(z => { const o = document.createElement('option'); o.value=z; o.textContent=z+'戦域'; zSel.appendChild(o); });
  updateTierAllianceFilter();
}

function updateTierAllianceFilter() {
  const data = allData.heroTotal || [];
  const zoneFilter = document.getElementById('tier-zone-filter').value;
  const aSel = document.getElementById('tier-alliance-filter');
  const current = aSel.value;
  aSel.innerHTML = '<option value="">全連盟</option>';
  const filtered = zoneFilter ? data.filter(r => String(r['戦域番号']) === String(zoneFilter)) : data;
  const alliances = [...new Set(filtered.map(r => r['連盟コード']).filter(Boolean))].sort();
  alliances.forEach(a => { const o = document.createElement('option'); o.value=a; o.textContent=a; aSel.appendChild(o); });
  if (alliances.includes(current)) aSel.value = current;
}

init();
</script>
